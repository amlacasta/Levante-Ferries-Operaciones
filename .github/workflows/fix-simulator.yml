name: Repair and relaunch simulator

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.simulator-fix-trigger'

permissions:
  contents: write

concurrency:
  group: simulator-repair
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Repair generators and links
        shell: bash
        run: |
          cat > scripts/build_simulator.py <<'PY'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path

          import pandas as pd
          from plotly.offline import get_plotlyjs

          ROOT = Path(__file__).resolve().parents[1]
          WEB_TARGET = ROOT / "simulator/operational_scenario_simulator.html"
          OFFLINE_TARGET = ROOT / "simulator/operational_scenario_simulator_offline.html"


          def build_simulator() -> tuple[Path, Path]:
              kpi = pd.read_csv(ROOT / "reports/tables/executive_kpis.csv").iloc[0]
              routes = pd.read_csv(ROOT / "reports/tables/route_scorecard.csv")

              base = {
                  "services": int(kpi["scheduled_services"]),
                  "completed": int(kpi["completed_services"]),
                  "cancel": float(kpi["cancel_rate_pct"]),
                  "otr": float(kpi["otr_15_completed_pct"]),
                  "delay": float(kpi["avg_departure_delay_min"]),
                  "occupancy": float(kpi["avg_occupancy_pct"]),
                  "margin": float(kpi["total_margin_eur"]),
              }
              exposure = {
                  "DEN-IBZ": 0.95, "DEN-FOR": 0.90, "DEN-PMI": 1.05,
                  "VAL-IBZ": 1.12, "VAL-PMI": 1.15, "BCN-PMI": 1.18,
                  "BCN-IBZ": 1.22, "MAH-BCN": 1.10,
              }
              route_rows = []
              for row in routes.itertuples(index=False):
                  route_rows.append({
                      "route": row.route_id,
                      "services": int(row.scheduled_services),
                      "otr": float(row.otr_15_completed_pct),
                      "delay": float(row.avg_delay_min),
                      "occ": float(row.avg_occupancy_pct),
                      "margin": float(row.avg_margin_eur),
                      "delayCost": float(row.total_delay_cost_eur),
                      "exposure": float(exposure.get(row.route_id, 1.0)),
                  })

              html = WEB_TARGET.read_text(encoding="utf-8")
              html = re.sub(
                  r"const BASE=\{.*?\};",
                  f"const BASE={json.dumps(base, ensure_ascii=False, separators=(',', ':'))};",
                  html,
                  count=1,
              )
              html = re.sub(
                  r"const ROUTES=\[.*?\];",
                  f"const ROUTES={json.dumps(route_rows, ensure_ascii=False, separators=(',', ':'))};",
                  html,
                  count=1,
                  flags=re.S,
              )
              html = re.sub(
                  r"Base = simulación validada de [\d\.]+ servicios\.",
                  f"Base = simulación validada de {base['services']:,} servicios.".replace(",", "."),
                  html,
                  count=1,
              )
              html = html.replace(
                  "x.otr<65?'RED':x.otr<75?'AMBER':'GREEN'",
                  "x.otr<85?'RED':x.otr<90?'AMBER':'GREEN'",
              )

              needle = '<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>'
              embedded = f"<!-- PLOTLY_START -->\n<script>\n{get_plotlyjs()}\n</script>\n<!-- PLOTLY_END -->"
              if needle in html:
                  self_contained = html.replace(needle, embedded, 1)
              elif "<!-- PLOTLY_START -->" in html and "<!-- PLOTLY_END -->" in html:
                  self_contained = re.sub(
                      r"<!-- PLOTLY_START -->.*?<!-- PLOTLY_END -->",
                      lambda _: embedded,
                      html,
                      count=1,
                      flags=re.S,
                  )
              else:
                  raise RuntimeError("No se ha encontrado un bloque Plotly actualizable")

              self_contained = self_contained.replace(
                  "Plotly se carga desde CDN",
                  "Plotly está incrustado: funciona sin conexión",
              )
              WEB_TARGET.write_text(self_contained, encoding="utf-8")
              OFFLINE_TARGET.write_text(self_contained, encoding="utf-8")
              print(WEB_TARGET, WEB_TARGET.stat().st_size)
              print(OFFLINE_TARGET, OFFLINE_TARGET.stat().st_size)
              return WEB_TARGET, OFFLINE_TARGET


          if __name__ == "__main__":
              build_simulator()
          PY

          cat > scripts/build_offline_simulator.py <<'PY'
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          source = ROOT / "simulator/operational_scenario_simulator.html"
          target = ROOT / "simulator/operational_scenario_simulator_offline.html"

          if not source.exists():
              raise RuntimeError("Ejecuta primero scripts/build_simulator.py")
          html = source.read_text(encoding="utf-8")
          if "Plotly está incrustado" not in html or "PLOTLY_START" not in html:
              raise RuntimeError("El simulador principal no es autosuficiente")
          target.write_text(html, encoding="utf-8")
          print(target, target.stat().st_size)
          PY

          cat > simulator/README.md <<'MD'
          # Simulador HTML Plotly

          El simulador se alimenta automáticamente de `executive_kpis.csv` y `route_scorecard.csv`.

          ## Abrir el simulador

          - [Simulador renderizado](https://raw.githack.com/amlacasta/Levante-Ferries-Operaciones/gh-pages/index.html)
          - [GitHub Pages](https://amlacasta.github.io/Levante-Ferries-Operaciones/)

          GitHub no ejecuta HTML desde la vista `blob`. Para usarlo localmente, descarga `operational_scenario_simulator_offline.html` y ábrelo con un navegador.

          ## Regeneración

          ```bash
          python scripts/run_pipeline.py
          python scripts/build_simulator.py
          python scripts/build_offline_simulator.py
          ```

          Ambos archivos contienen Plotly incrustado y funcionan sin conexión.
          MD

          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = "[**Abrir simulador operativo**](simulator/operational_scenario_simulator.html)\n\n[**Abrir versión offline**](simulator/operational_scenario_simulator_offline.html)"
          new = "[**Abrir simulador interactivo**](https://raw.githack.com/amlacasta/Levante-Ferries-Operaciones/gh-pages/index.html)\n\n[**Abrir mediante GitHub Pages**](https://amlacasta.github.io/Levante-Ferries-Operaciones/)\n\n[**Descargar el HTML autosuficiente**](simulator/operational_scenario_simulator_offline.html)\n\n> GitHub no ejecuta archivos HTML desde la vista de código. Los dos primeros enlaces abren el simulador renderizado; el tercero permite descargarlo y abrirlo localmente."
          if old in text:
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Rebuild and validate
        run: |
          python scripts/build_simulator.py
          python scripts/build_simulator.py
          python scripts/build_offline_simulator.py
          python -m pytest -q
          grep -q 'PLOTLY_START' simulator/operational_scenario_simulator.html
          cmp simulator/operational_scenario_simulator.html simulator/operational_scenario_simulator_offline.html

      - name: Commit repaired simulator
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/build_simulator.py scripts/build_offline_simulator.py simulator/README.md
          git add -f simulator/operational_scenario_simulator.html simulator/operational_scenario_simulator_offline.html
          if git diff --cached --quiet; then
            echo "No repair changes"
          else
            git commit -m "fix: make simulators self-contained [skip ci]"
            git push
          fi

      - name: Prepare static site
        run: |
          mkdir -p site
          cp simulator/operational_scenario_simulator_offline.html site/index.html
          cp simulator/operational_scenario_simulator_offline.html site/operational_scenario_simulator_offline.html
          cp simulator/operational_scenario_simulator.html site/operational_scenario_simulator.html
          touch site/.nojekyll

      - name: Relaunch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true
          enable_jekyll: false
          commit_message: 'deploy: relaunch working simulator'