name: Repair simulator links

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.readme-link-fix-trigger'

permissions:
  contents: write

jobs:
  repair-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace non-rendering GitHub links
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = '''- [Abrir simulador online](simulator/operational_scenario_simulator.html)
          - [Abrir simulador offline](simulator/operational_scenario_simulator_offline.html)
          - [Abrir presentación ejecutiva](deliverables/Proyecto_Control_Operativo_Ferries.pptx)'''
          new = '''- [Abrir simulador interactivo](https://raw.githack.com/amlacasta/Levante-Ferries-Operaciones/gh-pages/index.html)
          - [Abrir mediante GitHub Pages](https://amlacasta.github.io/Levante-Ferries-Operaciones/)
          - [Descargar HTML autosuficiente](simulator/operational_scenario_simulator_offline.html)
          - [Abrir presentación ejecutiva](deliverables/Proyecto_Control_Operativo_Ferries.pptx)

          > GitHub no ejecuta archivos HTML desde la vista de código. Usa el enlace interactivo o GitHub Pages; para trabajar sin conexión, descarga el HTML autosuficiente.'''
          if old not in text:
              raise SystemExit('No se encontró el bloque de enlaces esperado')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit corrected links
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: fix simulator launch links [skip ci]"
          git push