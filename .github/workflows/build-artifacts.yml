name: Build portfolio artifacts

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate analysis and deliverables
        run: |
          python scripts/run_pipeline.py
          python scripts/build_simulator.py
          python scripts/build_offline_simulator.py
          python scripts/build_presentation.py
          python scripts/create_notebooks.py
          python scripts/execute_notebooks.py
          python scripts/validate_notebooks.py
          python -m pytest -q

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notebooks reports deliverables simulator/operational_scenario_simulator.html
          git add -f simulator/operational_scenario_simulator_offline.html
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "build: generate portfolio artifacts [skip ci]"
            git push
          fi
